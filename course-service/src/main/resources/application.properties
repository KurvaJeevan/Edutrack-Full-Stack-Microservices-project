# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Eureka Discovery Client
# This tells the service where to find the "phonebook" (Discovery Service)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true


# JWT Secret (Must match the Authentication Service secret)
# In a real microservice, you'd use a Config Server, but for now, keep it here
jwt.secret=MyEduTrackSecretKeyForJwtAuthentication2026
