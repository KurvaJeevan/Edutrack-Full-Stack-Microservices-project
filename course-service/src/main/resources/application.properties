spring.application.name=COURSE-SERVICE
# Service Identity
server.port=8052

# Database Configuration (Service-Specific)
spring.datasource.url=jdbc:mysql://localhost:3306/course_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


#spring.datasource.url=jdbc:mysql://gateway01.ap-southeast-1.prod.aws.tidbcloud.com:4000/course_service_db?sslMode=VERIFY_IDENTITY&enabledTLSProtocols=TLSv1.2,TLSv1.3
