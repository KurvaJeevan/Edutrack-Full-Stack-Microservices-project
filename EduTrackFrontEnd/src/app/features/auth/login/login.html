<div class="container mt-5">
  <div class="card shadow-sm mx-auto" style="max-width: 450px; border-top: 5px solid #0d6efd;">
    <div class="card-body p-4">
      <h2 class="fw-bold mb-4 text-center">EduTrack Login</h2>
      
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <input formControlName="email" type="email" class="form-control" 
                 [class.is-invalid]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
                 placeholder="name@example.com">
          @if (loginForm.get('email')?.touched && loginForm.get('email')?.invalid) {
            <div class="invalid-feedback">Please enter a valid email.</div>
          }
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input formControlName="password" type="password" class="form-control"
                 [class.is-invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
                 placeholder="Enter your password">
          @if (loginForm.get('password')?.touched && loginForm.get('password')?.invalid) {
            <div class="invalid-feedback">Password is required.</div>
          }
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3 py-2 fw-bold" [disabled]="loginForm.invalid">
          Login
        </button>

        <div class="text-center">
          <span class="text-muted">New user? </span>
          <a routerLink="/register" class="text-decoration-none fw-bold">Create an Account</a>
        </div>

      </form>
    </div>
  </div>
</div>
